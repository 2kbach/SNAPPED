<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>SNAPPED</h1>
      <span class="version">v0.1</span>
    </div>

    <!-- Initial state -->
    <div id="state-idle" class="state">
      <p class="description">Select UI elements from any webpage and export them to Figma.</p>
      <button id="btn-start" class="btn-primary">Start Selection</button>
    </div>

    <!-- Selecting state -->
    <div id="state-selecting" class="state" style="display:none;">
      <div class="info-box">
        <p>Selection mode active</p>
        <p class="hint">Click elements on the page to select them.<br>Hold <kbd>Shift</kbd> for multi-select.<br>Press <kbd>Esc</kbd> to cancel.</p>
      </div>
    </div>

    <!-- Data ready state -->
    <div id="state-ready" class="state" style="display:none;">
      <div class="info-box success">
        <p id="element-count">0 elements captured</p>
        <p id="source-url" class="source-url"></p>
      </div>
      <button id="btn-copy" class="btn-primary">Copy to Clipboard</button>
      <p class="hint">Paste into the SNAPPED Figma plugin to create your design.</p>
      <div id="copy-success" class="copy-success" style="display:none;">Copied!</div>
      <button id="btn-reset" class="btn-secondary">Start Over</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
